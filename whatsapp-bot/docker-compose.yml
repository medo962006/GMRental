version: '3.8'

services:
  whatsapp-bot:
    build: .
    container_name: hostel-whatsapp-bot
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./data:/app/.wwebjs_auth
    # Health check
    healthcheck:
      test: ["CMD", "pgrep", "-f", "node index.js"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    # Resource limits
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.5'

# Optional: Add a log rotation sidecar
# (requires docker-compose v2.20+ or manual setup)

# Usage:
# 1. Copy .env.example to .env and fill in values
# 2. docker-compose up -d --build
# 3. View logs: docker-compose logs -f
# 4. Scan QR code from logs on first run