version: '3.8'

services:
  whatsapp-bot:
    build: .
    container_name: hostel-whatsapp-bot
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - whatsapp-auth:/app/.wwebjs_auth
    # Health check
    healthcheck:
      test: ["CMD", "pgrep", "-f", "node index.js"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    # Resource limits
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.5'

volumes:
  whatsapp-auth: